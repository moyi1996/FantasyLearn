syntax = "proto3";
package Fantasy.Network.Message;

// 协议分为:
// ProtoBuf:可以在Outer和Inner文件里使用。
// MemoryPack:可以在Outer和Inner文件里使用。

// 目前工具支持以下几种特殊用法:
// 在message协议上方添加// Protocol+空格+协议名字
// 例如: // Protocol ProtoBuf 或 // Protocol MemoryPack

// 分别代表使用Protobuf序列化或使用MemoryPack序列化
// 通过添加 // using 导出时添加自定义命名空间
// 例如: // using System.Runtime // using System.Reflection


message C2G_TestMessage // IMessage
{
	string Tag = 1;
}
message C2G_TestRequest // IRequest,G2C_TestResponse
{
	string Tag = 1;
}
message G2C_TestResponse // IResponse
{
	string Tag = 1;
}

message G2C_TestMessage // IMessage
{
	string Message = 1;
}

message G2C_Notification // IResponse
{
	string Message = 1;
}

message C2G_CreatePlayerRequest // IRequest,G2C_CreatePlayerResponse
{
	
}

message G2C_CreatePlayerResponse // IResponse
{

}

message C2G_SendPlayerMessage // IMessage
{

}

/// 客户端到聊天服务器的Message消息
message C2Chat_TestMessage // IRoamingMessage,ChatRoamingType
{
    string Tag = 1;
}
// 客户端到 Map 的单向消息
message C2Map_TestMessage // IRoamingMessage,MapRoamingType
{
    string Tag = 1;
}

// Gate 到 Chat 的单向消息
message G2Chat_TestMessage // IRoamingMessage,ChatRoamingType
{
    string Content = 1;
}

// 客户端到 Chat 的 RPC 请求
message C2Chat_GetDataRequest // IRoamingRequest,Chat2C_GetDataResponse,ChatRoamingType
{
    int64 PlayerId = 1;
}

message Chat2C_GetDataResponse // IRoamingResponse
{
    string ChatData = 1;
}

// Gate 到 Map 的 RPC 请求
message G2Map_GetPlayerRequest // IRoamingRequest,Map2G_GetPlayerResponse,MapRoamingType
{
    int64 PlayerId = 1;
}

message Map2G_GetPlayerResponse // IRoamingResponse
{
    string PlayerName = 1;
    int32 Level = 2;
}